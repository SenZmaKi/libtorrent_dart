name: libtorrent_dart
description: >
  Cross-platform Dart FFI wrapper over libtorrent (libtorrent-rasterbar).
  Provides full ABI-compatible bindings for sessions, magnet downloads,
  progress polling, pause/resume/cancel, and settings.
version: 0.1.0
repository: https://github.com/SenZmaKi/libtorrent_dart

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  ffi: ^2.1.2
  code_assets: ^1.0.0
  hooks: ^1.0.1
  yaml: ^3.1.3

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0

false_secrets:
  - thirdparty/libtorrent/test/ssl/invalid_peer_private_key.pem
  - thirdparty/libtorrent/test/ssl/root_ca_private.pem
  - thirdparty/libtorrent/test/ssl/peer_private_key.pem
  - thirdparty/libtorrent/test/ssl/server.pem
