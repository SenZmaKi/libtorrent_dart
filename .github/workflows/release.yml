name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1

      - name: Cache Dart packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-dart-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-dart-

      - name: Cache CMake build dirs
        uses: actions/cache@v4
        with:
          path: |
            cmake_build
            thirdparty/libtorrent-build
          key: ${{ runner.os }}-cmake-${{ hashFiles('CMakeLists.txt', 'src/c/**', 'thirdparty/libtorrent/CMakeLists.txt', 'thirdparty/libtorrent/include/**', 'thirdparty/libtorrent/src/**') }}
          restore-keys: |
            ${{ runner.os }}-cmake-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libboost-dev libssl-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake ninja boost openssl@3

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $boostDir = Get-ChildItem 'C:\local' -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -like 'boost_*' } |
            Select-Object -First 1
          if (-not $boostDir) {
            choco install -y boost-msvc-14.3 --no-progress --limit-output --execution-timeout=1200
          }
          cmake --version
          ninja --version

      - name: Configure and build (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -G Ninja -S . -B cmake_build/linux \
            -DCMAKE_BUILD_TYPE=Release \
            -DLTD_BOOST_HEADERS_ROOT=/usr/include
          cmake --build cmake_build/linux --target libtorrent_dart -j4

      - name: Configure and build (macOS)
        if: runner.os == 'macOS'
        run: |
          BOOST_ROOT=/opt/homebrew/include
          if [ ! -f "$BOOST_ROOT/boost/version.hpp" ]; then
            BOOST_ROOT=/usr/local/include
          fi
          cmake -G Ninja -S . -B cmake_build/macos \
            -DCMAKE_BUILD_TYPE=Release \
            -DLTD_BOOST_HEADERS_ROOT="$BOOST_ROOT"
          cmake --build cmake_build/macos --target libtorrent_dart -j4

      - name: Configure and build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $boostDir = Get-ChildItem 'C:\local' -Directory | Where-Object { $_.Name -like 'boost_*' } | Select-Object -First 1
          if (-not $boostDir) { throw 'Boost headers not found under C:\local' }
          cmake -G Ninja -S . -B cmake_build/windows -DCMAKE_BUILD_TYPE=Release -DLTD_BOOST_HEADERS_ROOT="$($boostDir.FullName)"
          cmake --build cmake_build/windows --target libtorrent_dart -j4

      - name: Pub get
        run: dart pub get

      - name: Analyze
        run: dart analyze

      - name: Test
        run: dart test

      - name: Upload release binary
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: binaries/linux/libtorrent-rasterbar.so

      - name: Upload release binary
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos-binary
          path: binaries/macos/libtorrent-rasterbar.dylib

      - name: Upload release binary
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: binaries/windows/torrent-rasterbar.dll

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;26.3.11579264"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libboost-dev

      - name: Configure and build (Android arm64)
        run: |
          cmake -G Ninja -S . -B cmake_build/android \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DLTD_BOOST_HEADERS_ROOT=/usr/include
          cmake --build cmake_build/android --target libtorrent_dart -j4

      - name: Upload Android binary
        uses: actions/upload-artifact@v4
        with:
          name: android-binary
          path: binaries/android/libtorrent-rasterbar.so

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install macOS dependencies
        run: |
          brew update
          brew install cmake ninja boost openssl@3

      - name: Configure and build (iOS arm64)
        run: |
          cmake -G Xcode -S . -B cmake_build/ios \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DLTD_BOOST_HEADERS_ROOT=/opt/homebrew/include \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build cmake_build/ios --config Release --target libtorrent_dart

      - name: Upload iOS binary
        uses: actions/upload-artifact@v4
        with:
          name: ios-binary
          path: binaries/ios/libtorrent-rasterbar.a

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-and-test, build-android, build-ios]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare release asset names
        run: |
          cp release-assets/linux-binary/libtorrent-rasterbar.so release-assets/linux-libtorrent-rasterbar.so
          cp release-assets/macos-binary/libtorrent-rasterbar.dylib release-assets/macos-libtorrent-rasterbar.dylib
          cp release-assets/windows-binary/torrent-rasterbar.dll release-assets/windows-torrent-rasterbar.dll
          cp release-assets/android-binary/libtorrent-rasterbar.so release-assets/android-libtorrent-rasterbar.so
          cp release-assets/ios-binary/libtorrent-rasterbar.a release-assets/ios-libtorrent-rasterbar.a

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          # Temporary hack: update the existing v1.1.2 release assets instead of
          # creating branch/tag-specific releases while validating the pipeline.
          TAG_NAME: v1.1.2
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" \
              release-assets/linux-libtorrent-rasterbar.so \
              release-assets/macos-libtorrent-rasterbar.dylib \
              release-assets/windows-torrent-rasterbar.dll \
              release-assets/android-libtorrent-rasterbar.so \
              release-assets/ios-libtorrent-rasterbar.a \
              --clobber
          else
            gh release create "$TAG_NAME" \
              release-assets/linux-libtorrent-rasterbar.so \
              release-assets/macos-libtorrent-rasterbar.dylib \
              release-assets/windows-torrent-rasterbar.dll \
              release-assets/android-libtorrent-rasterbar.so \
              release-assets/ios-libtorrent-rasterbar.a \
              --title "$TAG_NAME" \
              --target "${{ github.sha }}" \
              --generate-notes
          fi
