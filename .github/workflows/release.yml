name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/build-native

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: binaries/linux/*/libtorrent-rasterbar.so

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/build-native

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: macos-binary
          path: binaries/macos/*/libtorrent-rasterbar.dylib

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/build-native

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: binaries/windows/*/torrent-rasterbar.dll

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;26.3.11579264"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build ccache libboost-dev

      - name: Cache static OpenSSL (Android arm64)
        id: openssl-cache
        uses: actions/cache@v4
        with:
          path: thirdparty/openssl-android
          key: android-openssl-3.4.1-ndk26-arm64

      - name: Build static OpenSSL for Android arm64
        if: steps.openssl-cache.outputs.cache-hit != 'true'
        run: bash scripts/build_openssl_android.sh

      - name: ccache Storage
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: Android-ccache-${{ github.sha }}
          restore-keys: |
            Android-ccache-

      - name: Configure and build (Android arm64)
        run: |
          test -f /usr/include/boost/version.hpp
          # Copy Boost to an isolated path: the NDK toolchain adds /usr/include
          # to CMAKE_CXX_IMPLICIT_INCLUDE_DIRECTORIES so CMake silently strips
          # it from include_directories().  A non-system path is never filtered.
          mkdir -p /tmp/boost-include
          cp -r /usr/include/boost /tmp/boost-include/
          BOOST_ROOT="/tmp/boost-include"
          VERSION="$(grep -E '^version:' pubspec.yaml | awk '{print $2}')"
          OPENSSL_ROOT="$PWD/thirdparty/openssl-android/arm64-v8a"
          cmake --preset android \
            -DLTD_BINARY_LAYOUT_VERSION="$VERSION" \
            -DLTD_BOOST_HEADERS_ROOT="$BOOST_ROOT" \
            -DBoost_INCLUDE_DIR="$BOOST_ROOT" \
            -DBoost_INCLUDE_DIRS="$BOOST_ROOT" \
            -DBOOST_ROOT="$BOOST_ROOT" \
            -DBOOST_INCLUDEDIR="$BOOST_ROOT" \
            -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT" \
            -DOPENSSL_CRYPTO_LIBRARY="$OPENSSL_ROOT/lib/libcrypto.a" \
            -DOPENSSL_SSL_LIBRARY="$OPENSSL_ROOT/lib/libssl.a" \
            -DOPENSSL_INCLUDE_DIR="$OPENSSL_ROOT/include"
          cmake --build --preset android --parallel

      - name: Upload Android binary
        uses: actions/upload-artifact@v4
        with:
          name: android-binary
          path: binaries/android/*/libtorrent-rasterbar.so

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install macOS dependencies
        run: |
          brew update
          brew install cmake ninja ccache boost openssl@3

      - name: ccache Storage
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: iOS-ccache-${{ github.sha }}
          restore-keys: |
            iOS-ccache-

      - name: Configure and build (iOS arm64)
        run: |
          VERSION="$(grep -E '^version:' pubspec.yaml | awk '{print $2}')"
          BOOST_INC="$(brew --prefix boost)/include"
          cmake --preset ios \
            -DLTD_BOOST_HEADERS_ROOT="$BOOST_INC" \
            -DLTD_BINARY_LAYOUT_VERSION="$VERSION"
          cmake --build --preset ios --parallel

      - name: Upload iOS binary
        uses: actions/upload-artifact@v4
        with:
          name: ios-binary
          path: binaries/ios/*/Release/libtorrent-rasterbar.a

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows, build-android, build-ios]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare release asset names
        run: |
          LINUX_LIB="$(find release-assets/linux-binary -type f -name 'libtorrent-rasterbar.so' | head -n 1)"
          MACOS_LIB="$(find release-assets/macos-binary -type f -name 'libtorrent-rasterbar.dylib' | head -n 1)"
          WINDOWS_LIB="$(find release-assets/windows-binary -type f -name 'torrent-rasterbar.dll' | head -n 1)"
          ANDROID_LIB="$(find release-assets/android-binary -type f -name 'libtorrent-rasterbar.so' | head -n 1)"
          IOS_LIB="$(find release-assets/ios-binary -type f -name '*.a' | head -n 1)"

          if [ -z "$LINUX_LIB" ] || [ -z "$MACOS_LIB" ] || [ -z "$WINDOWS_LIB" ] || [ -z "$ANDROID_LIB" ] || [ -z "$IOS_LIB" ]; then
            echo "One or more release binaries were not found in downloaded artifacts" >&2
            exit 1
          fi

          cp "$LINUX_LIB" release-assets/linux-libtorrent-rasterbar.so
          cp "$MACOS_LIB" release-assets/macos-libtorrent-rasterbar.dylib
          cp "$WINDOWS_LIB" release-assets/windows-torrent-rasterbar.dll
          cp "$ANDROID_LIB" release-assets/android-libtorrent-rasterbar.so
          cp "$IOS_LIB" release-assets/ios-libtorrent-rasterbar.a

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" \
              release-assets/linux-libtorrent-rasterbar.so \
              release-assets/macos-libtorrent-rasterbar.dylib \
              release-assets/windows-torrent-rasterbar.dll \
              release-assets/android-libtorrent-rasterbar.so \
              release-assets/ios-libtorrent-rasterbar.a \
              --clobber
          else
            gh release create "$TAG_NAME" \
              release-assets/linux-libtorrent-rasterbar.so \
              release-assets/macos-libtorrent-rasterbar.dylib \
              release-assets/windows-torrent-rasterbar.dll \
              release-assets/android-libtorrent-rasterbar.so \
              release-assets/ios-libtorrent-rasterbar.a \
              --title "$TAG_NAME" \
              --target "${{ github.sha }}" \
              --generate-notes
          fi
